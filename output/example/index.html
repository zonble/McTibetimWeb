<body>
    <div class="main">
        <p id="loading">Loading...</p>

        <div class="left">
            <h1>McTibetim</h1>
            <div id="edit_area">
                <textarea placeholder="Type here" id="text_area" rows="10" cols="50" title="Input area"
                    autocapitalize="off"></textarea>
                <div id="ime_warning"
                    style="display: none; background-color: #ffeb3b; color: #d84315; padding: 8px; margin-bottom: 8px; border-radius: 4px; font-weight: bold;">
                    偵測到系統輸入法介入，請暫時關閉您的系統輸入法，直接使用英數鍵盤打字。
                </div>
                <div class="simple-keyboard" id="keyboard"> </div>
                <div class="function" id="function">
                    <div class="composing_buffer" id="composing_buffer"></div>
                    <div class="candidates" id="candidates"></div>
                </div>
            </div>
        </div>
        <div class="right">
            <h2>Keyboard Layout</h2>
            <label for="input-table-select" class="visually-hidden">Keyboard Layout</label>
            <select id="input-table-select" title="Keyboard Layout">
            </select>
            <h2>使用說明</h2>
            <!-- <ul>
                <li>建議使用電腦打開這個網頁，或是將您的手機或平板接上實體鍵盤，手機輸入則請使用英語鍵盤</li>
                <li>在打字的時候，會主動查詢可以自動補完的候選字</li>
                <li>使用英文字母—以及標點輸入文字時，會進入輸入區</li>
                <li>用 <b>Tab</b> 或是 1-9 鍵選擇要補完候選字</li>
                <li>出現可以自動補完候選字時，可以用上下鍵移動游標，用上下頁按鍵（Page Up/Page Down）換頁 </li>
            </ul> -->
